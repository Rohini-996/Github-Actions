name: Run Tests

on: 
  workflow_dispath

jobs:
  run-script-using-ci:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout Code 
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run script 
        run: python test_script.py 
