name: Python lint 

on:
    push:
        branch: [main]

jobs:
    validate:
        runs-on: ubuntu-latest 

        steps:
            - name: checkout code 
              run: actions/checkout@v4
            
            - name: setup python 3.13
              uses: actions/setup-python@v5 
              with:
                python-version: "3.13"

            - name: install depemdencies
              run: pip install -r requirements.txt 

            - name: run linter 
              run: flake8 app.py 
              