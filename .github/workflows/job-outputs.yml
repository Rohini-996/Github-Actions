name: Job outputs demo 

on: 
  workflow_dispatch 

jobs:
  generate-date:
    runs-on: ubuntu-latest 

    outputs:
      today: ${{ steps.set_date.outputs.today }}

    steps:
      - name: set today's date 
        id: set_date 
        run: |
          echo "today=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT 


  use_date:
    runs-on: ubuntu-latest 
    needs: generate-date 

    steps:
      - name: Print date from previous job
        run: |
          echo "Today's date is: ${{ needs.generate-date.outputs.today }}"


