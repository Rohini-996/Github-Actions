name: Self hosted runner

on:
  workflow_dispatch

jobs:
  self-hosted-job:
    runs-on: self-hosted

    steps:
      - name: print hostname
        run: hostname

      - name: print Working Directory
        run: pwd

      - name: Create a Test File
        run: echo "Hello from self-hosted runner" > test-file.txt

      - name: Verify File Exists
        run: ls -l
