name: upload artifact demo 

on:
  workflow_dispatch

jobs:
  artifact-job:
    runs-on: ubuntu-latest

    steps:
      - name: create a test report 
        run: |
          echo "Created a test report - Day 44" > report.txt 
          echo "All test passed" >> report.txt 

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.txt 

